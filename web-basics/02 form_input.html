<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module02: input, button</title>
</head>
<body>
    
    <label for="f_name">First name</label>
    <input type="text" placeholder="Jane" name="f_name">
    <br><br>

    <label for="u_email">Email</label>
    <input type="email" name="u_email" placeholder="@gmail.com">
    <br><br>

    <label for="u_phone">Telephone Number</label>
    <input type="tel" name="u_phone" placeholder="+25478362829">
</body>
</html>
